<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CryptoScope</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .contact-form-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
        }
        .form-group textarea {
            height: 150px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">CryptoScope</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="mobile-menu-btn"><i data-lucide="menu"></i></div>
    </nav>

    <header class="hero" style="height: 35vh;">
        <h1>Get in Touch</h1>
        <p>Questions about a review? Want us to check out a new project? Drop us a line.</p>
    </header>

    <section class="section-container">
        <div class="contact-form-container">
            <form>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" placeholder="How can we help?" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; border: none; cursor: pointer;">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-bottom"><p>&copy; 2024 CryptoScope. All rights reserved.</p></div>
    </footer>
    <script src="/js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
